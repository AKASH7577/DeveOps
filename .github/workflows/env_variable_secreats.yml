name: Demo CI env Secrets

on:
  push
  # workflow_dispatch:

env:
  GLOBAL_APP_ENV: global-dev

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JOB_APP_ENV: job-dev

    steps:
      - name: Say Hello
        run: echo "Hello from the second workflow!"

      - name: install
        env: 
          APP_ENV: development
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: echo "Environment $APP_ENV using $DB_PASSWORD"
      
      - name: Create demo file
        run: 
          echo "This is a demo file." > demo.txt
          echo "File created  successfully."
      - name: Upload Demo
        uses: actions/upload-artifact@v7
        with:
          name: demo-artifact
          path: .

  test:
      runs-on: ubuntu-latest
      needs: build

      steps:
        - name: Test job
          run: echo "TTest job"
