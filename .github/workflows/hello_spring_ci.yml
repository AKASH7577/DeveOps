name: Hello Spring Boot App to Docker

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Java Installation
        run: java --version

      - name: Verify Maven Installation
        run: mvn -version

      - name: Build and Test
        working-directory: Docker/app1-hello/springboot/hello-spring
        run: mvn clean verify

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: Docker/app1-hello/springboot/hello-spring/target/surefire-reports

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        working-directory: Docker/app1-hello/springboot/hello-spring
        run: mvn clean package -DskipTests

      - name: Verify JAR
        run: ls -la Docker/app1-hello/springboot/hello-spring/target

      - name: Login to Docker Hub
        run: echo "Docker login will be added later"

      - name: Build Docker Image
        run: echo "Docker build command will be added later"

      - name: Push Docker Image
        run: echo "Docker push command will be added later"